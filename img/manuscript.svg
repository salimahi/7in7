<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <g opacity="0.09" font-family="Courier New, Courier, monospace" font-size="11.5" fill="#8C6737">
    <g transform="rotate(-3, 700, 450)">
      <text x="80" y="55">INT. APARTMENT - NIGHT</text>
      <text x="80" y="73">A small studio. Papers on every surface. SARA stares at the</text>
      <text x="80" y="91">blank page. The cursor blinks. She types. Deletes. Types again.</text>
      <text x="80" y="127" font-style="italic">                         SARA</text>
      <text x="80" y="145">                   I thought I had something to say.</text>
      <text x="80" y="163">                   Last week. Before the prompt dropped.</text>
      <text x="80" y="199">EXT. STREET - EARLY MORNING</text>
      <text x="80" y="217">She walks fast. Script pages in hand. Mouthing every line.</text>
      <text x="80" y="235">A stranger watches her go. She doesn't notice.</text>
      <text x="80" y="271" font-style="italic">                         SARA (V.O.)</text>
      <text x="80" y="289">                   Seven pages. Seven days. Same blank page.</text>
      <text x="80" y="307">                   Every month I wonder if this is the one.</text>
      <text x="80" y="343">INT. COFFEE SHOP - DAY</text>
      <text x="80" y="361">Noise. Her headphones do nothing. She opens the laptop anyway.</text>
      <text x="80" y="379">Types. Stares out the window. Types again.</text>
      <text x="80" y="415" font-style="italic">                         BARISTA</text>
      <text x="80" y="433">                   Your usual?</text>
      <text x="80" y="469" font-style="italic">                         SARA</text>
      <text x="80" y="487">                   Just the deadline.</text>
      <text x="80" y="523">EXT. ROOFTOP - DUSK</text>
      <text x="80" y="541">She reads the finished pages aloud to no one in particular.</text>
      <text x="80" y="559">Wind takes some words. She doesn't stop.</text>
      <text x="80" y="595" font-style="italic">                         SARA</text>
      <text x="80" y="613">                         (quietly)</text>
      <text x="80" y="631">                   That'll do.</text>
      <text x="80" y="667">INT. APARTMENT - LATER</text>
      <text x="80" y="685">She submits. The progress bar fills. She closes the lid.</text>
      <text x="80" y="721" font-style="italic">                         SARA</text>
      <text x="80" y="739">                   See you next month.</text>
      <text x="80" y="757">She means it.</text>
      <text x="740" y="90">EXT. PARK - AFTERNOON</text>
      <text x="740" y="108">MICHAEL sits on a bench. He hasn't written in three weeks.</text>
      <text x="740" y="126">He watches pigeons. He thinks about the prompt.</text>
      <text x="740" y="162" font-style="italic">                         MICHAEL</text>
      <text x="740" y="180">                   The prompt was a door. I drew a window.</text>
      <text x="740" y="216">INT. LIBRARY - EVENING</text>
      <text x="740" y="234">Four writers. Four laptops. Zero eye contact.</text>
      <text x="740" y="270" font-style="italic">                         NARRATOR (V.O.)</text>
      <text x="740" y="288">                   Everyone starts at the same blank page.</text>
      <text x="740" y="306">                   The page doesn't care who you are.</text>
      <text x="740" y="342">INT. RECORDING STUDIO - NIGHT</text>
      <text x="740" y="360">Actors gather around a table. Scripts in hand. Someone</text>
      <text x="740" y="378">wrote this in seven days. Tonight it becomes something else.</text>
      <text x="740" y="414" font-style="italic">                         DIRECTOR</text>
      <text x="740" y="432">                   From the top.</text>
      <text x="740" y="486">                                        FADE OUT.</text>
    </g>
  </g>
</svg>
